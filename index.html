<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Escáner Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 15px; margin: 0; background: #f4f4f4; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; background: white; border-radius: 10px; overflow: hidden; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Botón de archivo personalizado */
        .btn-file { background: #28a745; color: white; padding: 12px; border-radius: 5px; cursor: pointer; display: block; margin-top: 10px; font-weight: bold; }
        input[type="file"] { display: none; }

        /* Búsqueda manual */
        .search-box { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        input[type="number"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:active { background: #0056b3; }
        
        /* Ficha de producto */
        img { max-width: 150px; border-radius: 8px; margin: 10px auto; display: block; }
        #nombre { margin: 10px 0 2px 0; font-size: 24px; }
        #formato { margin: 2px 0; font-size: 18px; font-weight: normal; }
        #fabricante { color: gray; margin: 2px 0 0 0; font-size: 16px; font-weight: normal; }
        #estado { color: #007bff; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <h2>Escáner de Productos</h2>
    
    <!-- Contenedor del escáner de cámara -->
    <div id="reader"></div>

    <!-- Botón para subir foto -->
    <label class="btn-file">
        Escanear desde foto
        <input type="file" id="qr-input-file" accept="image/*">
    </label>

    <!-- Sección de búsqueda manual -->
    <div class="card">
        <p style="margin: 0 0 5px 0; color: gray; font-size: 14px;">¿Ingresar manual?</p>
        <div class="search-box">
            <input type="number" id="input-manual" placeholder="Ej: 789123456789">
            <button onclick="buscarManual()">Buscar</button>
        </div>
    </div>

    <!-- Mensaje de estado -->
    <div id="estado">Buscando en múltiples bases de datos...</div>

    <!-- Ficha del producto -->
    <div class="card" id="producto-info" style="display: none;">
        <img id="foto" src="" alt="Foto del producto">
        <h2 id="nombre"></h2>
        <h3 id="formato"></h3>
        <h3 id="fabricante"></h3>
    </div>

    <script>
        // 1. Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW falló", err));
        }

        // 2. Base de datos local
        let miBaseDatos = JSON.parse(localStorage.getItem('misProductos')) || {};

        // 3. Sistema de puntuación para elegir el mejor resultado de las APIs
        function crearCandidato(nom, form, fab, img) {
            let p = {
                nombre: nom || 'Nombre no disponible',
                formato: form || 'Formato desconocido',
                fabricante: fab || 'Fabricante desconocido',
                foto: img || ''
            };
            let puntos = 0;
            if (p.nombre !== 'Nombre no disponible') puntos += 3;
            if (p.formato !== 'Formato desconocido') puntos += 1;
            if (p.fabricante !== 'Fabricante desconocido') puntos += 1;
            if (p.foto !== '') puntos += 4;
            p.puntaje = puntos;
            return p;
        }

        // 4. Motor de búsqueda (Consulta local y luego las 3 APIs)
        async function buscarProducto(codigoEscaneado) {
            document.getElementById('estado').style.display = 'block';
            document.getElementById('producto-info').style.display = 'none';
            document.getElementById('input-manual').value = codigoEscaneado; // Reflejar en el input

            // Buscar en DB local
            if (miBaseDatos[codigoEscaneado]) {
                mostrarProducto(miBaseDatos[codigoEscaneado]);
                document.getElementById('estado').style.display = 'none';
                return;
            }

            // Buscar online
            try {
                const promesas = [
                    fetch(`https://world.openfoodfacts.org/api/v0/product/${codigoEscaneado}.json`).then(r => r.json()).catch(() => null),
                    fetch(`https://world.openproductsfacts.org/api/v0/product/${codigoEscaneado}.json`).then(r => r.json()).catch(() => null),
                    fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${codigoEscaneado}`).then(r => r.json()).catch(() => null)
                ];

                const resultados = await Promise.all(promesas);
                let candidatos = [];

                if (resultados[0] && resultados[0].status === 1) {
                    let prod = resultados[0].product;
                    candidatos.push(crearCandidato(prod.product_name, prod.quantity, prod.brands, prod.image_url));
                }
                if (resultados[1] && resultados[1].status === 1) {
                    let prod = resultados[1].product;
                    candidatos.push(crearCandidato(prod.product_name, prod.quantity, prod.brands, prod.image_url));
                }
                if (resultados[2] && resultados[2].code === "OK" && resultados[2].items.length > 0) {
                    let item = resultados[2].items[0];
                    candidatos.push(crearCandidato(item.title, item.size || item.weight, item.brand, item.images.length > 0 ? item.images[0] : ''));
                }

                if (candidatos.length > 0) {
                    candidatos.sort((a, b) => b.puntaje - a.puntaje);
                    const mejorProducto = candidatos[0];
                    delete mejorProducto.puntaje;

                    miBaseDatos[codigoEscaneado] = mejorProducto;
                    localStorage.setItem('misProductos', JSON.stringify(miBaseDatos));
                    mostrarProducto(mejorProducto);
                } else {
                    alert("Producto no encontrado en las bases de datos.");
                }
            } catch (error) {
                alert("Error de conexión.");
            }

            document.getElementById('estado').style.display = 'none';
        }

        // 5. Mostrar en pantalla
        function mostrarProducto(p) {
            document.getElementById('producto-info').style.display = 'block';
            document.getElementById('nombre').innerText = p.nombre;
            document.getElementById('formato').innerText = p.formato;
            document.getElementById('fabricante').innerText = p.fabricante;
            const img = document.getElementById('foto');
            if(p.foto) { img.src = p.foto; img.style.display = 'block'; } 
            else { img.style.display = 'none'; }
        }

        // 6. Configuración de Html5Qrcode
        const html5QrCode = new Html5Qrcode("reader");
        let escaneando = false;

        // Función para manejar escaneo exitoso desde la cámara
        function onCameraScanSuccess(decodedText) {
            if(escaneando) return; // Evitar múltiples escaneos rápidos
            escaneando = true;
            html5QrCode.pause(); // Pausamos la cámara
            
            buscarProducto(decodedText).then(() => {
                setTimeout(() => { 
                    html5QrCode.resume(); 
                    escaneando = false; 
                }, 3000); // Reanudamos después de 3 segundos
            });
        }

        // Iniciar cámara al cargar la página
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {
                // Iniciamos la cámara trasera si está disponible
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onCameraScanSuccess);
            }
        }).catch(err => { console.log("Cámara no disponible o sin permisos", err); });

        // 7. Evento para escanear desde archivo (Botón Verde)
        document.getElementById('qr-input-file').addEventListener('change', e => {
            if (e.target.files.length == 0) return;
            const imageFile = e.target.files[0];
            
            // Usamos la función nativa de html5QrCode para archivos
            html5QrCode.scanFile(imageFile, true)
                .then(decodedText => buscarProducto(decodedText))
                .catch(err => {
                    alert("No se detectó un código de barras en la imagen. Intenta con otra foto más nítida.");
                    console.log(err);
                });
        });

        // 8. Evento de Búsqueda Manual
        function buscarManual() {
            const codigo = document.getElementById('input-manual').value.trim();
            if (!codigo) {
                alert("Ingresa un número primero.");
                return;
            }
            buscarProducto(codigo);
        }
    </script>
</body>
</html>
